name: Patch wrangler.toml with real D1 database ID

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch D1 database ID from Cloudflare API
        id: get_id
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?name=midman-pulse-db" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")

          echo "API response: $RESPONSE"

          DB_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('result', [])
          if not results:
              print('NOT_FOUND')
          else:
              print(results[0]['uuid'])
          ")

          echo "Database ID: $DB_ID"

          if [ "$DB_ID" = "NOT_FOUND" ] || [ -z "$DB_ID" ]; then
            echo "❌ Could not find midman-pulse-db. Make sure it was created first."
            exit 1
          fi

          echo "db_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Patch wrangler.toml
        run: |
          DB_ID="${{ steps.get_id.outputs.db_id }}"
          sed -i "s/database_id = \"REPLACE_AFTER_CREATION\"/database_id = \"${DB_ID}\"/" wrangler.toml
          echo "✅ Patched wrangler.toml with database_id = $DB_ID"
          cat wrangler.toml

      - name: Commit and push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wrangler.toml
          if git diff --staged --quiet; then
            echo "Nothing to commit — wrangler.toml already has real ID"
            exit 0
          fi
          git commit -m "chore: set real D1 database_id in wrangler.toml [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
