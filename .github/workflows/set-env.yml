name: Set Cloudflare Pages Environment Variables

on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest

    steps:
      - name: Set INGEST_SECRET on Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          echo "=== Setting environment variables on Cloudflare Pages ==="

          RESPONSE=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/midman-pulse" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"deployment_configs\": {
                \"production\": {
                  \"env_vars\": {
                    \"INGEST_SECRET\": {
                      \"value\": \"${INGEST_SECRET}\",
                      \"type\": \"secret_text\"
                    }
                  }
                },
                \"preview\": {
                  \"env_vars\": {
                    \"INGEST_SECRET\": {
                      \"value\": \"${INGEST_SECRET}\",
                      \"type\": \"secret_text\"
                    }
                  }
                }
              }
            }")

          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if data.get('success'):
              print('✅ Environment variable INGEST_SECRET set successfully on Cloudflare Pages')
          else:
              print('❌ Failed:', json.dumps(data.get('errors', []), indent=2))
              sys.exit(1)
          "

      - name: Trigger redeploy so new env vars take effect
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Fetching latest deployment to retrigger ==="

          LATEST=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/midman-pulse/deployments?per_page=1" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")

          DEPLOY_ID=$(echo "$LATEST" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('result', [])
          if results:
              print(results[0]['id'])
          else:
              print('NONE')
          ")

          if [ "$DEPLOY_ID" = "NONE" ]; then
            echo "⚠️  No existing deployment found to retrigger — push a commit to redeploy manually"
            exit 0
          fi

          echo "Retriggering deployment: $DEPLOY_ID"

          RETRY=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/midman-pulse/deployments/${DEPLOY_ID}/retry" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")

          echo "$RETRY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if data.get('success'):
              print('✅ Redeploy triggered — env vars will be live in ~1 minute')
          else:
              print('⚠️  Retrigger response:', json.dumps(data.get('errors', []), indent=2))
          "
