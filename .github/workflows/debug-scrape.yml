name: Debug — Verbose Scrape Test

on:
  workflow_dispatch:

jobs:
  scrape-verbose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run verbose scrape test
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          python3 - <<'EOF'
import os, requests
from xml.etree import ElementTree

INGEST_URL    = os.environ["INGEST_URL"]
INGEST_SECRET = os.environ["INGEST_SECRET"]

FEEDS = [
    {"url": "https://feeds.feedburner.com/TheHackersNews",                    "source_name": "The Hacker News", "category": "cybersecurity"},
    {"url": "https://techcrunch.com/category/artificial-intelligence/feed/",  "source_name": "TechCrunch AI",   "category": "ai"},
    {"url": "https://venturebeat.com/ai/feed/",                               "source_name": "VentureBeat AI",  "category": "ai"},
]

for feed in FEEDS:
    print(f"\n{'='*60}")
    print(f"Fetching: {feed['source_name']} — {feed['url']}")
    try:
        resp = requests.get(feed["url"], timeout=15, headers={"User-Agent": "MidManPulse/1.0"})
        print(f"  HTTP {resp.status_code}, content-length: {len(resp.content)} bytes")
        if resp.status_code != 200:
            print(f"  ❌ Bad status, skipping")
            continue

        root = ElementTree.fromstring(resp.content)
        items = root.findall(".//item")
        print(f"  Found {len(items)} items in feed")

        if items:
            first = items[0]
            title_el = first.find("title")
            link_el  = first.find("link")
            print(f"  First item title: {title_el.text if title_el is not None else 'NONE'}")
            print(f"  First item link:  {link_el.text if link_el is not None else 'NONE'}")
    except Exception as e:
        print(f"  ❌ Error: {e}")

print(f"\n{'='*60}")
print("Testing ingest endpoint auth...")
resp = requests.post(
    INGEST_URL,
    json=[{
        "title": "Verbose Test — Real Scrape Debug",
        "summary": "Checking ingest auth and DB insert.",
        "source_url": "https://example.com/verbose-test",
        "source_name": "Debug",
        "category": "ai",
        "published_at": "2026-04-09T00:00:00Z",
        "is_featured": False,
        "tags": ["debug"],
    }],
    headers={
        "Authorization": f"Bearer {INGEST_SECRET}",
        "Content-Type": "application/json",
    },
    timeout=30,
)
print(f"Ingest response HTTP {resp.status_code}: {resp.text}")
EOF
