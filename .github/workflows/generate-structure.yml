name: Generate Project Structure

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create directory structure
        run: |
          mkdir -p .github/workflows
          mkdir -p scripts
          mkdir -p src/lib/components/layout
          mkdir -p src/lib/components/feed
          mkdir -p src/lib/components/ui
          mkdir -p src/lib/components/ads
          mkdir -p src/lib/server
          mkdir -p src/lib/stores
          mkdir -p src/lib/routes/[category]
          mkdir -p src/lib/routes/article/[slug]
          mkdir -p src/lib/routes/api/ingest
      
      - name: Create files
        run: |
          touch .github/workflows/deploy.yml
          touch .github/workflows/scrape.yml
          touch scripts/scrape.py
          touch src/app.html
          touch src/app.css
          touch src/app.d.ts
          touch src/lib/components/layout/Nav.svelte
          touch src/lib/components/layout/Footer.svelte
          touch src/lib/components/feed/ArticleCard.svelte
          touch src/lib/components/feed/ArticleFeed.svelte
          touch src/lib/components/feed/CategoryFilter.svelte
          touch src/lib/components/ui/Badge.svelte
          touch src/lib/components/ui/Skeleton.svelte
          touch src/lib/components/ads/AdSlot.svelte
          touch src/lib/server/db.ts
          touch src/lib/stores/theme.ts
          touch src/lib/types.ts
          touch src/lib/routes/+layout.svelte
          touch src/lib/routes/+layout.server.ts
          touch src/lib/routes/+page.svelte
          touch src/lib/routes/+page.server.ts
          touch src/lib/routes/[category]/+page.svelte
          touch src/lib/routes/[category]/+page.server.ts
          touch src/lib/routes/article/[slug]/+page.svelte
          touch src/lib/routes/article/[slug]/+page.server.ts
          touch src/lib/routes/api/ingest/+server.ts
          touch package.json
          touch svelte.config.js
          touch vite.config.ts
          touch tsconfig.json
          touch tailwind.config.js
          touch wrangler.toml
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Generate project structure" || echo "No changes to commit"
          git push
